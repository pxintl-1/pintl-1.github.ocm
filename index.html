<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隨機抽選聊天樹洞</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; }
        .input-group { display: flex; margin-bottom: 15px; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-upload { background: #28a745; color: white; }
        .btn-upload:hover { background: #218838; }
        .btn-random { background: #007bff; color: white; width: 100%; padding: 12px; margin-bottom: 20px; font-size: 1.1rem; }
        .btn-random:hover { background: #0069d9; }
        .status { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 15px; }
        .result-box { background: #e9ecef; border-left: 5px solid #007bff; padding: 15px; border-radius: 4px; min-height: 50px; font-size: 1.1rem; word-break: break-all; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎲 隨機文字抽選樹洞</h2>
    <div class="status" id="statusText">目前文字庫內已有許多靈魂文字...</div>

    <div class="input-group">
        <input id="textInput" placeholder="寫下你的心情、秘密或笑話..." autocomplete="off">
        <button class="btn-upload" id="uploadBtn">上傳投入</button>
    </div>

    <button class="btn-random" id="randomBtn">🔮 隨機抽選一條文字</button>

    <div class="result-box" id="resultBox">
        點擊上方藍色按鈕，隨機抽取別人的留言吧！
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    const textInput = document.getElementById('textInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const randomBtn = document.getElementById('randomBtn');
    const resultBox = document.getElementById('resultBox');
    const statusText = document.getElementById('statusText');

    // 1. 點擊上傳按鈕
    uploadBtn.addEventListener('click', () => {
        const text = textInput.value.trim();
        if (text) {
            socket.emit('upload text', text); // 發送給後端儲存
            textInput.value = '';
            alert('成功投入文字庫！');
        }
    });

    // 2. 點擊隨機抽選按鈕
    randomBtn.addEventListener('click', () => {
        socket.emit('request random'); // 向後端索取隨機資料
    });

    // 3. 監聽後端回傳的隨機抽選結果
    socket.on('random result', (msg) => {
        resultBox.textContent = msg;
    });

    // 4. 監聽文字庫數量更新（即時連線特效）
    socket.on('pool updated', (count) => {
        statusText.textContent = `目前文字庫內累積了 ${count} 條文字！`;
    });
</script>

</body>
</html>
