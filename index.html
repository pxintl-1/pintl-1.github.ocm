<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub 即時聊天室</title>
    <style>
        body { margin: 0; padding-bottom: 3rem; font-family: sans-serif; background: #f4f6f9; }
        #form { background: rgba(0, 0, 0, 0.15); padding: 0.25rem; position: fixed; bottom: 0; left: 0; right: 0; display: flex; height: 3rem; box-sizing: border-box; backdrop-filter: blur(10px); }
        #input { border: none; padding: 0 1rem; flex-grow: 1; border-radius: 2rem; margin: 0.25rem; }
        #input:focus { outline: none; }
        #form > button { background: #333; border: none; padding: 0 1rem; margin: 0.25rem; border-radius: 3px; color: #fff; cursor: pointer; }
        #messages { list-style-type: none; margin: 0; padding: 0; }
        #messages > li { padding: 0.5rem 1rem; background: #fff; margin: 5px 10px; border-radius: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        #messages > li:nth-child(odd) { background: #e9ecef; }
    </style>
</head>
<body>
    <ul id="messages"></ul>
    <form id="form" action="">
      <input id="input" autocomplete="off" placeholder="請輸入訊息..." /><button>發送</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // 初始化 Socket.io 連線
        const socket = io();

        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');

        // 當按下發送按鈕時
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value) {
                // 發送訊息給後端伺服器
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

        // 監聽後端伺服器廣播過來的訊息
        socket.on('chat message', (msg) => {
            const item = document.createElement('li');
            item.textContent = msg;
            messages.appendChild(item);
            window.scrollTo(0, document.body.scrollHeight);
        });
    </script>
</body>
</html>
